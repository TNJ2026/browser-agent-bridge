<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Smoke Test Page</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 2rem; max-width: 400px; margin: auto; }
    div { margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
    input, select, button { width: 100%; padding: 0.5rem; font-size: 1rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <h1>Bridge Smoke Test</h1>
  <div>
    <label for="input-field">Text Input</label>
    <input id="input-field" type="text" placeholder="Type here..." />
  </div>
  <div>
    <label for="select-field">Dropdown Select</label>
    <select id="select-field">
      <option value="A">Option A</option>
      <option value="B">Option B</option>
    </select>
  </div>
  <button id="submit-btn" onclick="document.getElementById('result').innerText = document.getElementById('input-field').value">Submit Action</button>
  <div>
    <strong>Result:</strong>
    <span id="result">Initial Text</span>
  </div>
</body>
</html>
